<!DOCTYPE html>
<html>
<head>
    <title>Treasure Hunter AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for Location-Based -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep-blue: #0a0a1a;
            --hot-red: #ff3333;
            --safe-green: #33ff99;
        }
        
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; }
        
        #game-ui {
            position: fixed;
            top: 25px; left: 20px; right: 20px;
            z-index: 999;
            pointer-events: none;
        }

        .stat-container {
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(8px);
            border: 2px solid var(--neon-gold);
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            color: white;
        }

        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; display: block; }
        .value { font-size: 24px; font-weight: 800; color: var(--neon-gold); }

        #status-hud {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 3px solid var(--neon-gold);
            transition: all 0.4s ease;
        }

        /* The Radar Pulse */
        .radar-scanner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--neon-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .radar-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--neon-gold);
            border-radius: 50%;
            opacity: 0.5;
            animation: pulse-ring 2s infinite ease-out;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Intro Screen */
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--deep-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .glitch-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--neon-gold);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .start-btn {
            background: var(--neon-gold);
            color: var(--deep-blue);
            border: none;
            padding: 20px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 40px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
            transition: all 0.2s;
            pointer-events: auto;
        }
        .start-btn:active { transform: scale(0.9); }

        #distance-m { font-family: monospace; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="radar-scanner" style="width: 80px; height: 80px; margin-bottom: 20px;">
            <div class="radar-pulse"></div>
            <div style="width: 10px; height: 10px; background: gold; border-radius: 50%;"></div>
        </div>
        <h1 class="glitch-title">Artifact Hunter</h1>
        <p style="opacity: 0.7; max-width: 250px; line-height: 1.5;">A rare digital relic has been detected within 20 meters of your location.</p>
        <button class="start-btn" id="start-btn">Initialize Scanner</button>
    </div>

    <div id="game-ui">
        <div class="stat-container">
            <div>
                <span class="label">Relics Found</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="radar-scanner" id="radar-visual">
                <div class="radar-pulse" id="pulse-element"></div>
                <div style="width: 6px; height: 6px; background: white; border-radius: 50%;"></div>
            </div>
            <div style="text-align: right;">
                <span class="label">Proximity</span>
                <span class="value"><span id="distance-m">--</span><small style="font-size: 14px;">M</small></span>
            </div>
        </div>
        <div id="status-hud">System Offline</div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- The Treasure: A complex glowing artifact -->
        <a-entity id="treasure"
            visible="false"
            scale="20 20 20"
            gps-entity-place="latitude: 0; longitude: 0;"
            class="clickable">
            
            <!-- Outer Ring -->
            <a-entity 
                geometry="primitive: torus; radius: 0.5; radiusTubular: 0.02"
                material="color: #ffcc00; metalness: 1; roughness: 0; emissive: #ffcc00; emissiveIntensity: 0.5"
                animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear">
            </a-entity>
            
            <!-- Inner Rotating Diamonds -->
            <a-entity 
                geometry="primitive: octahedron; radius: 0.2"
                material="color: #ffffff; metalness: 1; roughness: 0; emissive: #ffffff; emissiveIntensity: 1"
                animation="property: rotation; to: 0 -360 0; loop: true; dur: 2000; easing: linear">
            </a-entity>

            <!-- Light Source -->
            <a-light type="point" intensity="2" color="#ffcc00" distance="5"></a-light>
        </a-entity>

        <a-camera gps-camera rotation-reader cursor="fuse: false; rayOrigin: mouse;"></a-camera>
    </a-scene>

    <script>
        let score = 0;
        let isSpawned = false;
        const treasure = document.getElementById('treasure');
        const statusHud = document.getElementById('status-hud');
        const distanceM = document.getElementById('distance-m');
        const scoreEl = document.getElementById('score');
        const setupScreen = document.getElementById('setup-screen');
        const startBtn = document.getElementById('start-btn');
        const pulseElement = document.getElementById('pulse-element');

        startBtn.addEventListener('click', () => {
            setupScreen.style.opacity = '0';
            setupScreen.style.transition = 'opacity 0.5s ease';
            setTimeout(() => setupScreen.style.display = 'none', 500);
            
            statusHud.innerText = "Synchronizing Satellites...";
            
            navigator.geolocation.getCurrentPosition((position) => {
                const userLat = position.coords.latitude;
                const userLong = position.coords.longitude;

                // Randomly spawn artifact between 15 and 25 meters away
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.0002; // Roughly 20 meters
                const spawnLat = userLat + Math.cos(angle) * radius;
                const spawnLong = userLong + Math.sin(angle) * radius;

                treasure.setAttribute('gps-entity-place', `latitude: ${spawnLat}; longitude: ${spawnLong};`);
                treasure.setAttribute('visible', 'true');
                isSpawned = true;
                statusHud.innerText = "Signal Locked. Move!";
            }, (err) => {
                statusHud.innerText = "GPS Link Failed";
                statusHud.style.borderBottomColor = "red";
            }, { enableHighAccuracy: true });
        });

        // Proximity Logic
        window.addEventListener('gps-camera-update-position', (ev) => {
            if (!isSpawned) return;
            
            const dist = treasure.getAttribute('distance');
            if (dist) {
                const meters = Math.floor(dist);
                distanceM.innerText = meters;
                
                // Dynamic UI Changes
                if (meters < 8) {
                    statusHud.innerText = ">> VISUAL CONTACT ESTABLISHED <<";
                    statusHud.style.borderBottomColor = "#33ff99";
                    pulseElement.style.animationDuration = "0.5s";
                    pulseElement.style.background = "#33ff99";
                } else if (meters < 18) {
                    statusHud.innerText = "Signal Strength: Strong";
                    statusHud.style.borderBottomColor = "#ffcc00";
                    pulseElement.style.animationDuration = "1s";
                    pulseElement.style.background = "#ffcc00";
                } else {
                    statusHud.innerText = "Signal Strength: Weak";
                    statusHud.style.borderBottomColor = "#444";
                    pulseElement.style.animationDuration = "2.5s";
                    pulseElement.style.background = "#444";
                }
            }
        });

        // Capture Logic
        treasure.addEventListener('click', () => {
            if (!treasure.getAttribute('visible')) return;
            
            score++;
            scoreEl.innerText = score;
            statusHud.innerText = "ARTIFACT SECURED";
            statusHud.style.background = "rgba(51, 255, 153, 0.3)";
            treasure.setAttribute('visible', 'false');
            
            setTimeout(() => {
                if(confirm("Relic Secured! Continue scanning for new signals?")) {
                    location.reload();
                }
            }, 600);
        });
    </script>
</body>
</html>
