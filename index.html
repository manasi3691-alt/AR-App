<!DOCTYPE html>
<html>
<head>
    <title>GPS Treasure Hunt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for Location-Based -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        #game-ui {
            position: fixed;
            top: 20px; left: 20px; right: 20px;
            z-index: 999;
            pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stat-box {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.75);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffcc00;
        }
        #status {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            pointer-events: auto;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        #error-hint {
            margin-top: 20px;
            font-size: 0.9em;
            color: #ff6b6b;
            display: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        .radar-dot {
            width: 15px;
            height: 15px;
            background: red;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="setup-screen">
        <h1 style="color: #ffcc00; margin-bottom: 10px;">AR Treasure Hunt</h1>
        <p>A digital artifact is hidden ~20m from you.</p>
        <p style="font-size: 0.85em; opacity: 0.7;">Make sure you are outside or near a window.</p>
        <button id="start-btn">Start the Hunt!</button>
        <div id="error-hint">
            <strong>GPS Blocked!</strong><br>
            1. Enable GPS in phone settings.<br>
            2. Allow browser location access.<br>
            3. Make sure you are on HTTPS.
        </div>
    </div>

    <div id="game-ui">
        <div class="stat-box">
            <span>Score: <span id="score">0</span></span>
            <span><span class="radar-dot" id="radar"></span>Dist: <span id="distance">--</span>m</span>
        </div>
        <div id="status">Ready to hunt?</div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- The Treasure (3D Rotating Torus) -->
        <a-entity id="treasure"
            geometry="primitive: torus; radius: 0.6; radiusTubular: 0.1"
            material="color: #FFD700; metalness: 0.9; roughness: 0.1"
            visible="false"
            scale="15 15 15"
            animation="property: rotation; to: 0 360 360; loop: true; dur: 5000"
            class="clickable">
            <!-- Sparkle detail -->
            <a-entity geometry="primitive: sphere; radius: 0.1" material="color: white; emissive: white" position="0.5 0.5 0"></a-entity>
        </a-entity>

        <a-camera gps-camera rotation-reader cursor="fuse: false; rayOrigin: mouse;"></a-camera>
    </a-scene>

    <script>
        let score = 0;
        let isSpawned = false;
        const treasure = document.getElementById('treasure');
        const statusEl = document.getElementById('status');
        const distanceEl = document.getElementById('distance');
        const setupScreen = document.getElementById('setup-screen');
        const startBtn = document.getElementById('start-btn');
        const errorHint = document.getElementById('error-hint');
        const radar = document.getElementById('radar');

        startBtn.addEventListener('click', () => {
            errorHint.style.display = 'none';
            statusEl.innerText = "Connecting to satellites...";
            
            // Step 1: Request GPS
            navigator.geolocation.getCurrentPosition((position) => {
                setupScreen.style.display = 'none';
                const userLat = position.coords.latitude;
                const userLong = position.coords.longitude;

                // Step 2: Spawn ~20 meters away
                // 0.00015 degrees is roughly 15-20 meters
                const spawnLat = userLat + (Math.random() - 0.5) * 0.0003;
                const spawnLong = userLong + (Math.random() - 0.5) * 0.0003;

                spawnTreasure(spawnLat, spawnLong);
            }, (err) => {
                statusEl.innerText = "GPS Error";
                errorHint.style.display = 'block';
                console.error("Location error:", err);
            }, { 
                enableHighAccuracy: true, 
                timeout: 15000,
                maximumAge: 0 
            });
        });

        function spawnTreasure(lat, lon) {
            treasure.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
            treasure.setAttribute('visible', 'true');
            isSpawned = true;
            statusEl.innerText = "Follow the signal! Walk around.";
        }

        // Distance & Hot/Cold Logic
        window.addEventListener('gps-camera-update-position', (ev) => {
            if (!isSpawned) return;
            
            const dist = treasure.getAttribute('distance');
            if (dist) {
                const meters = parseFloat(dist).toFixed(1);
                distanceEl.innerText = meters;
                
                // Color feedack
                if (meters < 10) {
                    statusEl.innerText = "HOT! Look around with your camera!";
                    statusEl.style.color = "#ff4444";
                    radar.style.background = "red";
                } else if (meters < 25) {
                    statusEl.innerText = "Getting warmer... keep walking.";
                    statusEl.style.color = "#ffcc00";
                    radar.style.background = "orange";
                } else {
                    statusEl.innerText = "Signal is weak. Walk a different way.";
                    statusEl.style.color = "white";
                    radar.style.background = "yellow";
                }
            }
        });

        // Collecting the artifact
        treasure.addEventListener('click', () => {
            if (!treasure.getAttribute('visible')) return;
            
            score++;
            document.getElementById('score').innerText = score;
            statusEl.innerText = "ARTIFACT COLLECTED!";
            statusEl.style.color = "#00ff00";
            treasure.setAttribute('visible', 'false');
            
            // Celebration effect (simple alert replacement)
            setTimeout(() => {
                const again = confirm("Great job! Found " + score + " treasure(s). Want to find another one in a new spot?");
                if (again) location.reload();
            }, 500);
        });
    </script>
</body>
</html>
