<!DOCTYPE html>
<html>
<head>
    <title>Artifact Hunter AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep-blue: #0a0a1a;
            --hot-red: #ff3333;
            --safe-green: #33ff99;
            --nav-blue: #00d4ff;
        }
        
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        #game-ui {
            position: fixed;
            top: 20px; left: 20px; right: 20px;
            z-index: 999;
            pointer-events: none;
        }

        .stat-container {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid var(--neon-gold);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
            color: white;
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px; opacity: 0.6; margin-bottom: 4px; display: block; }
        .value { font-size: 24px; font-weight: 900; color: var(--neon-gold); line-height: 1; }

        /* Character HUD Area */
        #character-hub {
            margin-top: 15px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .robot-avatar {
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--nav-blue);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            flex-shrink: 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .speech-bubble {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 0 15px 15px 15px;
            padding: 12px 16px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            flex-grow: 1;
            border-left: 4px solid var(--nav-blue);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            min-height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #nav-hint {
            font-size: 11px;
            color: var(--nav-blue);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .radar-scanner {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(255,204,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #nav-arrow {
            position: absolute;
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid var(--nav-blue);
            top: -12px;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 0 5px var(--nav-blue));
        }

        .radar-pulse {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--neon-gold);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse-ring 2s infinite ease-out;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 0.9; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .glitch-title {
            font-size: 48px;
            font-weight: 900;
            color: var(--neon-gold);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(255,204,0,0.5);
        }

        .start-btn {
            background: var(--neon-gold);
            color: var(--deep-blue);
            border: none;
            padding: 22px 60px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 40px rgba(255, 204, 0, 0.4);
            pointer-events: auto;
        }

        #distance-m { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="robot-avatar" style="width: 80px; height: 80px; margin-bottom: 20px; border-width: 3px;">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--nav-blue)">
                <path d="M12 8V4H8"></path>
                <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                <path d="M2 14h2"></path>
                <path d="M20 14h2"></path>
                <path d="M15 13v2"></path>
                <path d="M9 13v2"></path>
            </svg>
        </div>
        <h1 class="glitch-title">RELIQ<br>HUNTER</h1>
        <p style="opacity: 0.6; font-size: 0.9em; margin-top: 20px; line-height: 1.6;">Unit 7 is online. Ready to scan for digital artifacts.</p>
        <button class="start-btn" id="start-btn">Wake Up Unit 7</button>
    </div>

    <div id="game-ui">
        <div class="stat-container">
            <div>
                <span class="label">Archive</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="radar-scanner" id="radar-visual">
                <div id="nav-arrow"></div>
                <div class="radar-pulse" id="pulse-element"></div>
                <div style="width: 8px; height: 8px; background: #fff; border-radius: 50%;"></div>
            </div>
            <div style="text-align: right;">
                <span class="label">Proximity</span>
                <span class="value"><span id="distance-m">--</span><small style="font-size: 12px; margin-left:2px">M</small></span>
            </div>
        </div>
        
        <div id="character-hub">
            <div class="robot-avatar">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--nav-blue)">
                    <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                    <path d="M12 8V4H8"></path>
                    <path d="M9 13v2"></path>
                    <path d="M15 13v2"></path>
                </svg>
            </div>
            <div class="speech-bubble">
                <div id="status-hud">Unit 7: Systems ready.</div>
                <div id="nav-hint">Waiting for sensor lock...</div>
            </div>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-entity id="treasure" visible="false" scale="25 25 25" class="clickable">
            <a-entity 
                geometry="primitive: torus; radius: 0.5; radiusTubular: 0.03"
                material="color: #ffcc00; metalness: 1; roughness: 0.1; emissive: #ffcc00; emissiveIntensity: 0.4"
                animation="property: rotation; to: 360 720 0; loop: true; dur: 6000; easing: linear">
            </a-entity>
            <a-entity 
                geometry="primitive: box; width: 0.4; height: 0.4; depth: 0.4"
                material="color: #ffffff; opacity: 0.8; transparent: true; emissive: #ffffff"
                animation="property: rotation; to: -360 0 360; loop: true; dur: 3000; easing: linear">
            </a-entity>
            <a-light type="point" intensity="3" color="#ffcc00" distance="10"></a-light>
        </a-entity>

        <a-camera gps-camera rotation-reader cursor="fuse: false; rayOrigin: mouse;"></a-camera>
    </a-scene>

    <script>
        let score = 0;
        let isSpawned = false;
        let targetPos = { lat: 0, lon: 0 };
        
        const treasure = document.getElementById('treasure');
        const statusHud = document.getElementById('status-hud');
        const navHint = document.getElementById('nav-hint');
        const distanceM = document.getElementById('distance-m');
        const scoreEl = document.getElementById('score');
        const setupScreen = document.getElementById('setup-screen');
        const startBtn = document.getElementById('start-btn');
        const pulseElement = document.getElementById('pulse-element');
        const navArrow = document.getElementById('nav-arrow');

        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        startBtn.addEventListener('click', () => {
            setupScreen.style.opacity = '0';
            setupScreen.style.pointerEvents = 'none';
            setTimeout(() => setupScreen.style.display = 'none', 500);
            
            navigator.geolocation.getCurrentPosition((position) => {
                const userLat = position.coords.latitude;
                const userLong = position.coords.longitude;

                const angle = Math.random() * Math.PI * 2;
                const radius = 0.00025; 
                targetPos.lat = userLat + Math.cos(angle) * radius;
                targetPos.lon = userLong + Math.sin(angle) * radius;

                treasure.setAttribute('gps-entity-place', `latitude: ${targetPos.lat}; longitude: ${targetPos.lon};`);
                treasure.setAttribute('visible', 'true');
                isSpawned = true;
                statusHud.innerText = "Unit 7: Signal found!";
            }, (err) => {
                statusHud.innerText = "Unit 7: GPS Link failed.";
            }, { enableHighAccuracy: true });
        });

        window.addEventListener('gps-camera-update-position', (ev) => {
            if (!isSpawned) return;
            
            const dist = treasure.getAttribute('distance');
            if (dist) {
                const meters = Math.floor(dist);
                distanceM.innerText = meters;
                
                const userLat = ev.detail.position.latitude;
                const userLon = ev.detail.position.longitude;
                const bearing = getBearing(userLat, userLon, targetPos.lat, targetPos.lon);
                const cameraRotation = document.querySelector('a-camera').getAttribute('rotation').y;
                const relativeBearing = (bearing + cameraRotation) % 360;

                if (navArrow) {
                    navArrow.style.transform = `rotate(${relativeBearing}deg)`;
                }

                const diff = (relativeBearing + 360) % 360;
                if (meters < 7) {
                    statusHud.innerText = "Unit 7: It's right here!";
                    navHint.innerText = "SCAN UPWARDS NOW";
                    navHint.style.color = "var(--safe-green)";
                } else if (diff > 330 || diff < 30) {
                    statusHud.innerText = "Unit 7: Correct path.";
                    navHint.innerText = "PROCEED STRAIGHT";
                    navHint.style.color = "var(--safe-green)";
                } else if (diff >= 30 && diff < 150) {
                    statusHud.innerText = "Unit 7: Adjusting...";
                    navHint.innerText = "TURN TO THE RIGHT";
                    navHint.style.color = "var(--neon-gold)";
                } else if (diff >= 150 && diff < 210) {
                    statusHud.innerText = "Unit 7: Lost signal!";
                    navHint.innerText = "TURN AROUND IMMEDIATELY";
                    navHint.style.color = "var(--hot-red)";
                } else {
                    statusHud.innerText = "Unit 7: Detecting shift...";
                    navHint.innerText = "TURN TO THE LEFT";
                    navHint.style.color = "var(--neon-gold)";
                }

                if (meters < 12) {
                    pulseElement.style.animationDuration = "0.5s";
                    pulseElement.style.background = "#33ff99";
                } else {
                    pulseElement.style.animationDuration = "1.5s";
                    pulseElement.style.background = "#ffcc00";
                }
            }
        });

        treasure.addEventListener('click', () => {
            if (!treasure.getAttribute('visible')) return;
            score++;
            scoreEl.innerText = score;
            statusHud.innerText = "Unit 7: Artifact secured!";
            treasure.setAttribute('visible', 'false');
            setTimeout(() => {
                if(confirm("Unit 7: Relic archived. Ready for the next signal?")) {
                    location.reload();
                }
            }, 600);
        });
    </script>
</body>
</html>
